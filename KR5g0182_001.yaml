front:
  text: 上清外國放品青童內文卷上明七
  hash: sha256:8e91cb6fc56b0b35ed5cfedd6c610a808851889c839584517577620c5cf1d59c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0182_HFL_001-001a, image: hfl/1041/1041-050.png}
body:
  text: 髙上入國隱元內文上清太真玉保王上相大司馬命髙晨師東海玉門青華小童君受髙上玉帝外國放品隱元內文其道髙妙乃生於九玄之先結飛玄紫氣自然之章靈文表異煥明上清經九萬之劫刻書緑那之國靈鳥之山著東華之岫玄圃之上積石之隂流光洞曜映落太空日月俠照五晨翼靈八素交帶四會結煙飛霄翳氣蓊欎虗庭金華之女玉晨之童各三百人侍衛神文天妃揚香靈風散真飛龍走獸備羅玉關朱鳳撫翮神鸞廕玄西華宴禮萬聖朝軒以中皇元年三月一日甲子天德值合之時上相青童君清齋空山金青盟天受於髙上備遊六國履涉名山周歷五嶽步諸河源五帝扶翼降致靈軒十界衆聖宴禮廣庭洞窮寥幽攬究無形流精煥光以通道太陽激電以吐威七元運霄於紫虛八景馭轡而升飛詠玉音於外國放神品以入微命五老以整位招萬真以總歸九靈齊契三景合暉丹靈告瑞髙上監映位登上相名標紫晨身冠九色霜羅之袍佩流光曜靈洞元之章靈寶百變之冠流鈴交落丹雲九纏金華玉女紫晨之童各三千人侍衛君焉於是天玄啓韻範德應真權任上化主司九天總統天下普領萬仙生死圖籍無細不關君德髙道備逸朗玉清七元煥落五老侍靈三光俠映九帝齊軿飛煙紫蓋玄雲空生玉姬揚音神無羅錚龍吟鳯歌廣樂虛庭飛霄繞日流電激精華光交灑神燭合明獨秉靈符之節手魔命魔靈幡道遙紫雲之館徘徊青華之房威六天於來運剪萬精於群凶採後學於金簡校青籙於諸方延萬帝於曲字講寶訣於妙章演九玄以歷運解曲逯於瞳矇撰獨立以齊真嚴四極以撿違命四司以執罰符五帝以糾非普統無窮四垂六國五嶽名山億兆萬真莫不咸𨽻於青宮受事於上相也如是寶文乃髙上玄虛自然之章結飛玄紫氣以為隱文放外國之品三十六音置六國於五老之官行於有道飛仙之人玉音瓊朗妙義虛微皆表上皇玄古之韻四會八達結而成音真趣難詳其理難尋自非紫胞結絡玉藏通鮮九孔納靈之人不能解其微韻通於玉音髙上重祕故口口相傳九天以左輔執節仙都右置侍仙玉郎五方靈官各五萬人典衛寶文玉童玉女執巾侍香玄靈紫蓋散煙遐庭衆真交會煥朗上清如是上聖玉帝皆以八節之日上登瓊房行禮誦音玉響朗徹傾動九天書比之日則五星出宿七元停暉五帝浮位萬仙臨庭千妖喪目群魔滅精威制六國億境肅清神奇妙化不可言論流眄億劫而不滅大化改度而方鮮靈秀巍巍難可名焉若有此經皆刻簡於未生之前名題帝籍運挺應仙或天真下降得授此文或於世因緣遭遇經師夢嚮景應與真合靈得受玉音當燒香寂室禮願修行詠之一遍萬真交會五老朝形天魔伏首千妖喪精威振六國招仙致真九年三元詣房降致雲輿飛行上清但有是經於世不得修行精心供養則給玉童玉女各十二人侍衛左右營護有經者身辟却萬災禳伏甲兵千患萬害不敢妄干五帝防衛剋得下仙或尸變輪轉升入靈房但不得受於玉虛之任遊三清之中耳六國品銘三十六首天地五方皆有制御剛柔之色使不得落其地深二十億萬里得潤澤潤澤下二十億萬里得金粟澤金粟澤下二十億萬里得金剛鐵澤金剛鐵澤深入二十億萬里得水澤水澤下八十億萬里得大風澤大風澤下五百二十億萬里綱維天地制使不陷如今日月星辰為風所持也學者不知地下之境潤色深淺則五帝不過兆身於外國之境也東方弗于逮九萬里之外極豪林之墟其國音名呵羅提之國國地形正貟土色如碧脂之鮮無有山阜廣狹九十萬里其國人形長二丈壽四百嵗國有六音之銘是髙上始氣置於外國胡老之品髙上常吟歌其音以化胡老之人令知外國有不死之教如其國人皆行禮而誦其音是得四百歲之壽無有中夭之命上學之士知外國地色常吟詠六品之音者則致胡老仙官衛兆之身九年自然得遊呵羅提之國與胡老交言變化飛空遊行東極之境也東方呵羅提國第一品銘音曰擅阿夷提那維第二品銘音曰越家摩須雲持第三品銘音曰曇真釋遮緣陀第四品銘音曰誥波君運烏紫第五品銘音曰鍚晉靈法婆頥第六品銘音曰舍梨定曲泥臺東方呵羅提之國放六品之音置胡老之號知者壽與天地齊齡修行其道則致外國仙官來衛兆身當以太歲本命八節之日青書六品銘服一通東向叩齒九道吟詠六品六遍畢瞑目安身定神棄諸畢念思存東方無極無窮之境呵羅提之國洞達了然存胡老仙官無數衆皆來朝已行禮誦外國之音便微祝曰天地開境八達朗清洞觀無窮外國之名放品化音結氣成靈招仙致真億萬齊并逆究玄微監映無形上下嚮應內外肅清碧霞飛輪來輔我形運我上升北謁玉京畢咽氣九過止此髙上放外國之品神仙上法行之九年則致仙官通靈察微與神交言飛空騰虛白日升天南方閻浮利三十萬里之外極洞陽之野其國音則銘伊沙他之國國地平博無有髙下土色如丹廣狹八十一萬里其國人皆形長二丈四尺壽三百六十歲國有六音之銘是髙上置於外國越老之品髙上常吟歌其音以化越老之人令知其國有不死之教如其國人皆行禮而誦其音是得三百六十嵗之壽無有中夭之命學者知外國地色常吟詠六品之音者則致仙官衛兆之身九年自然得遊伊沙他之國與越老交言變化朱宫飛行南陽之境也南方伊沙他國第一品銘音曰難維那薜漢羅第二品銘音曰桓摩羅鬱藍波第三品銘音曰樂酆勒育明沙第四品銘音曰回素劫起飛陀第五品銘音曰根植遂百無和第六品銘音曰盈沖都玄鏡車南方伊沙他之國放六品之音置越老之號知者壽與天地同年修行其道則致外國飛仙之官來衛兆身當以太歲本命八節之日朱書六品之銘入室南向而服之叩齒九通吟詠六音六遍畢瞑目安神定氣棄諸異念存思南方無極無窮之境洞逹朗然存越老仙官無數衆來朝已身便微呪曰髙靈垂映散化朱宫流音六品結成丹容群仙來朝與真命雙洞觀八朗目覩華房分景上清出青入黃五色流精為我明光得遊六國上造玉堂受仙法服飛青羽裳流金交帶鳳文紫章與帝同真耀形玉亰畢咽氣九過止行之九年則致南方越老仙官來衛侍形察幽洞虛與神共言降致飛雲玄龍來迎西方俱那邑七十萬里之外極皓素之壟其國音則銘尼維羅緑那之國國地形多髙壟與天西關相接土色白如玉廣狹六十八萬里其國人形長一丈六尺壽六百年國有六音之銘是髙上置於外國氐老之品髙上常吟歌其音以化氐老之人令知其國有不死之教如其國人皆行禮誦詠其音是得壽六百之年無有中夭之命學者知外國地色常吟詠修行自有氐老仙官衛兆之身九年自然得遊尼維羅緑那之國與氐老仙官交言能飛行玄虛遊戲皓素之壟也西方緑那之國第一品銘音曰陀姨阿森呵根第二品銘音曰金羅國迦摩騫第三品銘音曰婆姨泥梵寶真第四品銘音曰離奎提藍婆臻第五品銘音曰世芬那茂緑晨第六品銘音曰提握沙入華田西方尼維羅緑那之國放六品之音以置氐老之號知者壽與日月同光修行其道則致外國飛仙之官來衛兆身當以太嵗本命八節之曰白書六品之銘入室正西向服之叩齒九通吟詠六音六遍畢瞑目安神定志棄諸外想思存西方無極無窮之境洞逹了然存氐老仙官旡數來朝已身便微呪曰天音微靈虛微命神玉國六分命一為真混化外國放品怡仙髙靈曲映我得自然乘空飛騰落景龍軒遊眄無方玄登五晨與氣齊暉命司髙騫億兆劫運永保長存畢咽氣九過止行此九年則致西方氐老仙官來衛兆身逆覩未然與真通靈降致青軿飛上玉清北方欎單五十萬里之外極朔隂之庭其國音則銘旬他羅之國國地長流平演土色黑潤廣狹五十八萬里其國人形長一丈二尺壽三百嵗國有六音之銘是髙上置於外國羌老之品髙上常吟歌其音以化羌老之人令知其國有不死之教如其國人皆行禮而誦詠其音者是得三百年壽無有中天之命學者知外國地色常吟詠修行則致羌老仙官衛兆之身九年自然得遊旬他羅之國與羌老交言飛行玄虛遊宴朔隂之庭也北方旬他羅之國第一品銘音曰幽羅鬱頭陀阿第二品銘音曰幽真釋維光那第三品銘音曰品鬱定爵世和第四品銘音曰隂夜寶開録沙第五品銘音曰法光景量國羅第六品銘音曰波密維遮迦訶北方旬他羅之國放六品之音以置羌老之號知者壽同七元之靈修行其道則致外國仙官來朝當以太嵗本命八節之目黑書六品之銘入室北向服之叩齒九通吟詠六音六遍畢瞑目安神定志棄諸外想思存北方無極無窮之境洞逹明朗存羌老仙官無數衆來朝已身便微呪曰北欎結羅七元吐精放品齋氣六國置名羌老彌純法化受靈髙仙命章我稟無形氣氣兼行洞朗八冥飛仙來朝蓊藹紫庭雲輿羽蓋緑霞丹軿致我上升以造玉清畢咽氣九過止行此九年則致北方羌老仙官來衛兆身逆究幽窮盡覩未然之事與真通靈飛行玄虛上升紫晨上方九天之上清陽虛空之內無色無象無形無影空洞之銘元精青沌自然之國以青氣為世芬上極無窮四覆諸天則髙上玉皇萬聖帝真受生之根無壽無量惟劫為年其空洞之內亦有六音之銘則元始置於真皇自然之品髙上吟歌其音其音以延群仙令知玄空有無量之真如其國玉皇萬帝皆禮音吟詠是得無量之壽學者知空洞之色吟詠修行則致三元下降五帝詣房授兆靈音九年則得乘虛駕浮上造玉清太空之中也上方元精青沌自然之國第一品銘音曰瓊瑶芬録定音第二品銘音曰鳳雲蘭丹寶林第三品銘音曰杳量光洞紫森第四品銘音曰緣那境入空瓊第五品銘音曰呵阿房薜胡軿第六品銘音曰七曜氣飛元青上方元精青沌自然之國放六品之音以標上清玉帝之真知者飛行玉虛萬仙來朝當以本命太歲八節之日青書六品之銘入室向太歲服之叩齒九通吟詠六音六遍畢瞑目安神定志棄諸想念思存無上之上清陽太空之內無色無象無形無影空洞之中洞達朗徹青氣鬱鬱下冠兆身便微呪曰元始自然青陽鬱冥玄化空洞無量無形結氣凝國芬世為名總覆諸天普植萬靈雲房金羅嵳峩上清六品放位標題元精玉音徹微玄響朗瓊吟詠發出帝真臨庭曲映垂條我享上靈與天齊位三景合明永保太空隨劫無傾畢咽氣九過止行此九年則三元下降授兆真音飛霞丹軿給兆之身飛行大洞上升玉清髙上祕法自無金名紫簡緑字上清不得行此道有者妄泄示人殃及七祖獲考三官已身亡命無復仙冀依科明慎奉焉中國直下極大風澤去地五百二十億萬里剛維地源制使不落土色如金之精中國音則銘太和寶真無量之國中嶽崑崙即據其中央諸天之别名上有玄圃七寶珠宫與天交端上真飛仙之館中國周回百二十億萬里其國人形長九尺皆學導引之術壽一千二百歲國有六音之銘是高上置於中國之品髙上玉皇帝君悉吟詠其音以化中國傖老之人令知其國有不死之教如其國人皆修上清之道行禮誦詠是得壽一千二百歲無有橫夭之年學者知中國地色吟詠修行則傖老仙官衛兆之身九年自然與傖老交言身登太空飛行上清太和寶真無量之國第一品銘音曰定世隂結榮和第二品銘音曰中寶珠若來華第三品銘音曰廣原緣理雲阿第四品銘音曰條瓊芬晉世羅第五品銘音曰洞靈音解世陀第六品銘音曰金根寶朱陽婆太和寶真無量之國放六品之音以置傖老之號知者壽同天地修行其道致傖老仙官來朝已身當以太嵗本命八節之日黃書六品之銘入室向本命服之叩齒九通吟詠六國之音六遍畢瞑目安神定志棄諸想念存思中國極下大風澤入地五百二十億萬里之淵朗逹分明傖老仙官無數衆來朝已身便祝曰中原總真萬帝玄靈九天垂典結氣凝精太黃浩浩億丈之庭中國放品分音六名玉嚮朗空徹微入青流真敷布陶育我形變化太和寶真利貞下洞無淵上升玉清畢咽氣九過止行此九年真人下降授兆真音得與傖老仙官交言乘空飛虛上升帝晨髙上置六國品銘化為三十六音元始之𥘉金鉼刻書其文各置一國今悉封於國境或封名山五嶽之洞如中國之音即對玄圃積石之隂如此神文皆各以紫晨玉童太華玉女各三百人侍衛典香舊科萬劫當行下世授於上真之人自無金名帝簡緑字玉清不得此文得受六國放品之音便得遊行無窮洞達六國之中上天入淵變化萬方履五嶽遊名山則胡越氐羌傖老仙官營衛送迎群魔伏首兵凶滅亡周流六國適意所從誦之萬遍三元詣房降致緑軿飛升玉晨此髙上自然之文上相撰飛玄紫氣之字以雌黃書碧瓊佩身遊五嶽入三清制群魔御萬靈威六國伏五兵行之九年真人詣庭能飛乘虛上造太清青童君曰上帝玉真及五嶽上仙皆服文而詠音佩身而修真學無此文則不得遊名山制六國却甲兵五老之官不衛身形為學之本當勤行五嶽尋受此文靈威告應自得道真髙上妙法雖不學而仙也青童君受髙上入六國內文後學欲遊名山之五嶽入六國致群仙制萬魔伏五兵當受五帝交音內文佩之六年得與六國仙官交言自明三十六國之音也黃帝受隱元三行霸天下通神明役鬼神制萬靈夏禹受交音三行使天下鬼神稟吉凶知宿命得輔靈仙曽玄受青洞文三行匡五龍遊雲宫安陽受九靈音三行登帝堂位加仙王赤精受寶真文位登四極出入三清王喬受苞元隱籙三行身登上真總領衆仙出入華房髙上於玄圃西壟金華之宫以化靈總衆內文以授上相青童君東濛隱文真書三行雌黃書碧繒上佩身則得遊行東方呵羅提之國制群靈斬天魔伏五兵遊名山胡老扶迎自知六國之音與神交言南方交音內文三行雌黃書碧繒上佩身則得遊伊沙他之國制群靈斬天魔伏五兵遊名山越老之官扶將送迎自知六國之音與神共言西混青洞隱元內文三行雌黃書碧繒上佩身則遊入尼維羅緑那之國制群靈斬天魔伏五兵出玄路入三清遊名山氐老扶迎自知六國之音與神人共言北九靈金光音三行雌黃書碧繒上佩身則得入旬他羅之國制群靈斬天魔伏五兵登廣寒謁北精遊名山羌老扶迎自知六國之音與神人交言上清陽苞元隱録內文三行雌黃書碧繒上佩身則得上遊元精青沌自然之國制群靈斬天魔伏五兵步空天升玉清遊名山萬真扶迎自然知六國之音與神共言中化靈總真衆內文三行雌黃書碧繒上佩身則得遊涉太和寶真無量之國制群靈斬天魔伏五兵入洞淵升玄冥戲北元謁紫庭遊名山則五老扶迎自然知六國之音與神共言髙上入六國內隱真文授於上相青童君雌黃書碧繒佩身項生寶光映照十天役使玉童玉女各三十六人遊行五嶽涉諸名山入六國履河源所在群仙五方之官皆來稽首緣界司迎制萬魔御千靈威六國伏五兵變化無方隨意所從降致飛輪丹霄紫軿來迎我身上升東華青宫位登上相總領萬真其道髙妙帝君寶文髙上今以其文刻書人鳥著之於蓬萊之岫玄圃之上積石之隂髙玄羽童華光交煥映曜太空紫煙重廕文采洞鮮舊科萬劫當傳巳成真人有得其文位加仙卿能周流六國與五老交言洞逹玄虛驅䇿萬靈自無玉骨刻名紫簡於末生之前不得此文得者不學亦為中仙輕泄寶音七祖充責運山負石萬劫不原巳身嬰見世風刀之考死入地獄不得又仙佩此文遊行六國履涉五嶽歷諸名山至其界首當先叩齒三十六通閉氣三十六息呪曰玉真徘徊雲駕昻昻是日上吉龍飛鳳翔列行羽儀四道開張六師啓導十界來迎仙童執幡玉女散香五老稽首翼翼洋洋日月交帶靈仙扶將履歷六國周流四鄉四瀆五嶽為我橋梁帝君使令掃除不祥諸所之造靡不吉良神竒異方仙練內昌外國洞朗上造玉京畢引氣三十六咽止此上相出遊威神大呪行之制六國伏萬靈致仙官來朝形變化無方上升太清受者對齋七日或三十日於齋中齎青紋之繒三十二尺金魚玉龍各一枚金鐶九雙上金五兩以代割髮裂帛之誓師北向告盟而傳弟子奉受依四極之科斂慎禁戒密而奉行上清太真玉保王上相大司馬命髙晨師東海玉門青華小童君受於髙上玉帝以傳四極真人部以五帝神兵罰於漏泄愆盟負誓七祖充責巳身亡命三徒五苦萬劫不原也上清外國放品青童內文卷上
