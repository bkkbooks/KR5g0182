body:
  text: 髙上九玄三十六天內音髙上九玄空洞三十六天洞淵九地外國放品內音者乃生於太空九玄之先結飛玄紫氣自然之章靈文鬱乎重霄真光煥乎上清神竒表異於太漢玉音朗激於金庭回風流於紫煙揚香灑於八冥丹暉發其瓊幹朱日灌其神真流盻億劫虛降空玄三素啓運九度推遷靈音表見刻書崑崙之山玄圃之上積石之隂文彩垂芒精煥上天日月齊其光五星同其明四會八逹洞徹玉清飛仙紫童各三百人典香侍靈佩以玃天之獸扞以金頭萬重九色流霞藹其巔神鸞朱鳳撫其軒五帝監真四極典仙七曜吐精以瑩厲玉華散真以飾塵履陽否而不灰經萬劫而更鮮至中皇元年三月一日甲子天德值合之時上清太真玉保王上相大司馬命髙晨師東海玉門青華小童君清齋上宫九百日青金盟天受於髙上玉帝遍遊諸天洞鑒虛無流䀎億津上觀無崖中戲廣貟周歷六國磐回九玄四司鑒試上元定仙玉虛垂映龜毋降真八景䇿轡五老翼軒飛仙互騁八風奏煙流電激威百陽吐精瓊輪曜虛羽蓋鬱玄金童散華玉女拂塵衆靈稽首五嶽朝真諸天晏禮十方司迎總領億道普監萬仙位登上相主司髙晨實由玉帝之妙旨三十六天之瓊音主生死於圖籍掌仙號於青宫領金名於玄記典白簡於玉篇上統無崖無極無窮下攝洞淵九地萬靈五嶽四極河海衆仙至三十六國莫不咸𨽻於青童舊科萬劫一傳九五之運三代交并當有玉名書於帝録三十六人得見其文得佩此音九地滅迹六國邀迎三十六天書名上宫三元下降自然成仙玄典苞於洞源靈䡄巍巍乎難論玉澳深而難測妙化難可屢陳略舉千分之一粗摽萬竒之一真也諸天內銘九地三十六音以元始同存空靈建號結自然之名表於九玄演流外國三十六音如是天地各有三十六分天則有三十六天王以應三十六國地有三十六土皇以應三十六天天王與真土皇主仙為學不知天之內音則天王不領兆名不知地下之音土皇則不滅兆迹閉不得仙有見其文受其訣音天王玄鑒七聖刻篇西龜定録東華書名土皇滅尸落迹九隂保舉上清五靈敬護十界扶迎周流六國平滅群凶五兵摧伏天魔束形九年乘空飛行上清真道髙妙不得妄宣輕泄寶音七祖充責已身殞亡三塗五苦萬劫不原上真之士慎科而行諸天王常以八節及月朔之日遊觀無崖歷戲雲房逍遙玉清流眄十方於明霞之上常詠諸天內音飛玄之章上慶天真內歡神襟玉響虛朗瓊韻合音當此之日五老浮位九帝臨軒四司鑒試五帝衛靈衆真齊唱萬仙禮音三光停暉七元煥明山海靜波諸天肅清八素散華四皇拂塵靈風揚香緑霞吐津天元溟滯玉虛含欣朗朗髙清之館眇眇太漠之中洞虛入微周鑒無窮有得其道與帝結朋勤誦其章位準仙王德同諸天夀齊三光凡學上仙之道志登玉清奉禮帝尊而不知三十六天之音飛玄之章則三十六天王不領兆名徒為精勤天不降真四司不敬五帝不迎天魔侵真終不成仙欲飛行玄虛遊宴五嶽而不知九地三十六土皇內名則九隂不落兆尸九地不滅兆迹徒勞幽山望飛反沉欲行此道每至八節月朔之日沐浴清齋入室燒香朝禮諸天北向叩齒三十六通微呪曰兆臣甲子志慕神仙八慶之日朝禮天尊上願騰景乘空落煙飛超玉清洞遊諸天中願變形降致五神升入月門仰啜八騫石景水母玉胞飛根長披朱日與光同存下願四極授我口言西華侍衛役使金晨攜提五老八景同軒上慶交合五願開陳得如所願體合自然真靈下降賜登上仙畢便六拜仰咽六氣次西向六拜咽六氣次南向六拜咽六氣次東向六拜咽六氣次西北六拜咽六氣次東南六拜咽六氣合六方三十六拜朝三十六天畢還北向平坐詠三十六天飛玄之章一遍竟又六拜六咽氣都止也此髙上朝三十六天上法行之九年天降雲輿三元詣房書名玉清刻簡青宫四司右别十界敬迎乘空飛行上升玉晨其法髙妙不得妄宣輕泄寶文七祖充責身沒鬼官長閉三徒萬劫不原髙上九玄三十六天內音第一無景無色鬱單無量天英勃天王姓混諱羅第二無形清微天化升天王姓馮諱提阿沙第三無精波羅褥天玄黑天王姓雲諱奎零第四入色水無量億羅天飛宗天王姓王諱阿衛四天之音元始自然氣在髙上玉清之上四天王常以八節月朔之日遊觀髙上玉清無崖無極無形無色太空之巔誦詠四天之音飛玄之章其日符四司周行天下學仙之人有齋誡誦經朝禮諸天者即刻名玄簡注録青宫壽同四天之人九年飛行白日升天四天自然飛玄之章曰鬱澄緣梵寶禪王和三界攜輪九象提魔維結洞覽榮秀垂柯慶霄重飛朱蘭吐葩流丹上回精灌玉霞鳳鳴絶峯龍駭玄阿金音遙朗虛韻結那三晨敷暉朱采文羅九空迅煙八風揚華金輿瓊輪鳳軒婆娑金音流馥雲層峩峩芳津交灑靈漿滂沱玄谷玉泉如舟如河體洞自然億齡奚多徘徊金門宴景皇家長保玉虛永無傾差第五無極洞清上上禪善無量壽天雲羅天王姓諱第六玄微自然上虛禹餘天梵咽天王姓羅諱波梨荼第七玄清上無那首約諍天玄那天王姓梵諱摩首波第八梵行上清氣稽那邉淨天云攜天王姓騫諱首苛四天之音上始胤梵自然氣在髙虛玉清之中四天王常以八節月朔之日遊觀髙虛無涯無極無名玄空之巔誦詠四天之音飛玄之章其日符天真使者周行天下有學仙清苦齋誡誦飛玄之童朝禮諸天即奏名四天刻書帝簡壽同四天之人九年飛行上升天宫四天飛玄之章曰波韻呵泥玄景散暉丹霞敷簡曜靈瓊微零風梵音朱曰左回玉響玄室金霄四垂髙騫拂精石景騰飛諸天玄映玉帝徘徊緑轅丹輿翠羽錦衣遊朗九崖手披天扉與日同盛與月同衰沐浴金門冠帶神輝學同天人壽極二儀髙上合歡萬仙總歸玉虛結符永無傾危天真敷陳上亭紫微斯願仰降朝禮玉階第九無窮洞虛極上須延天回摩天王姓澤諱羅第十玄梵玉虛無精氣羅迦浮月天雲阿天王姓周諱阿迦須第十一氣玄天逹上靈赤天重慕天王姓丹諱清浮𤤠第十二大梵玄元氣離惒行如天世畢天王姓固諱分若四天之音九空始陽洞冥之氣在玄虛玉清之下四天王常以八節月朔之日遊觀常虛無崖無鞅空虛之中誦詠四天之音飛玄之章其日遣太真使者周行天下有學仙清齋誦經朝禮者即奏名四天刻書帝録壽同四天之人九年飛行上升天宫四天飛玄之章曰訶羅夜寶玉梵秀騫維那彌落洞賾世真玉瑶叩音琳響自然朱瓊曜葩慶雲內鮮流霞吐蘭丹回紫煙三天齊光七矅啓晨八景回輿九帝同軒攜提髙匠紫虛上仙齊唱合韻以部玉真靈典遐眇瓊音命神五老束帶四極羅纒九氣徘徊結虛成煙三靈垂映七精灌津形陶玉潤拔度玄根超凌無崖歷戲諸天洞入無色反我宿緣第十三無極上靈玉空玄洞寂然天家主天王姓津諱第十四寶梵天色上天王姓隨真氣潘羅玄妙天雲持諱梨沐音第十五飛梵行真上玄答謾福德天部利天王姓王諱惟鉢離第十六雲梵流精中元近際淳天世良天王姓朱諱梨藹四天之音梵行上始洞虛之氣在虛皇上清之上四天王常以八節月朔之日遊觀虛皇上清無崖無極空洞之上誦詠四天之音飛玄之章其日遣上仙玉監周行天下有學仙行道朝禮諸天燒香誦經即奏名四天刻書録簡壽同四天之人九年飛行空虛上升玄宫四天飛玄之章曰摩夷四張六韻合雙靈音散發虛變成宫玉玄逸霄提訶激鍾瓊響琅玕嘯神命童八景齊真九帝同朋南越浮利北落寒宫回真四周廣靈之堂上御靈章下制魔凶雲飛重玄四逹交通緣霞吐津羅布太空紫虛結煙徘徊丹房三暉洞明七曜流光朱日鬱茂緑梵洋洋三十六位玉蘭灌芳九隅齊響禪我為王鑒映十天萬仙來宗有明瓊音玄成仙公與劫為期永保無窮第十七玄上洞極無崖不驕樂天流芳天王姓凝諱𩅺第十八大梵玄青無精答惒近際天元深天王姓阿諱明秀第十九行梵紫虛上元首帶快見天洞干天王姓劉諱且扇第十二虛梵上清化靈須陀結愛天飛衣天王姓彭諱移那四天之音飛梵行上虛紫元之氣在虛皇上清之中四天王常以八節月朔之日遊觀虛皇上清無崖無極空洞之中詠誦四天之音飛玄之章其日遣玉真定仙周行天下有學仙行道朝禮諸天燒香誦經之人即奏名天王刻書青録壽同四天之人九年飛行上清四天飛玄之章曰雲曇丹陀維賾妙靈重霄鬱虛簿蘭翠榮藹藹丹飈回映雲庭界世法輪結氣澄清緑柯含條綵華曜瓊八風舞軒六龍飛鳴金音虛朗玉唱空生俊真上景四帝齊靈皇崖晏轡玉仙䇿軿遊䀎四天洞披三清逍遙無崖髙映太冥曜羅灌暉七元吐精冠帶仙官津陶朱形長享元慶極真玉齡第二十一上極無景洞微化應聲天玉攜天王姓輝諱第二十二大梵九玄中元氣阿那給道德天天葵天王姓揵諱尼姤第二十三行梵元清下靈氣須逹天總幾天王姓周諱難首第二十四極梵洞微九靈氣須帶阿那天九曲天王姓竺諱明和四天之音極寶梵上靈玄清之氣在虛皇上清之下四天王常以八節月朔之日同遊虛皇上清無崖無極空洞之下誦詠四天之音飛玄之章其日遣領真玉郎周行天下有學仙行道朝禮諸天燒香誦經之人即奏名天王刻書玄文壽同四天之人九年飛行上清四天飛玄之章曰提維結緑金根植靈世輪法華九象貟明法鼓朱音流磬寒庭八風舞軒雲羅吐瓊瓊瑶虛朗玉慧洞鳴皇暉含蘭丹葩發榮玉秀霄柯重虛紫清髙晨顯蓋徘徊金城八景同和九帝齊并流芬翳空馥灑太冥飛輪羽蓋升入無形與氣混合永晏極齡第二十五無名至極洞微梵寶天天王姓精諱霧雲第二十六微梵玄天氣帶扇給道德天天王姓洛諱須阿摩第二十七虛梵天氣蟬然識慧天天王姓云諱無陀第二十八空梵中天績元伊檀天天王姓朱諱仲生四天之音玄微上元梵天之氣在虛無太清之上四天王常以八節月朔之日同遊虛無太清無崖無極空無之上誦詠四天之音飛玄之章其日遣中真八靈仙人周行天下有學仙行道朝禮諸天誦經念善之人即奏名天王刻書玄文壽同四天之人九年飛行上升太清宫四天飛玄之章曰檀勒洹沙玉韻發謡朱蘭內映景雲吐翹八風揚精瓊音逸遼翳翳遐搆翼翼太霄紫鳳鬱虛結秀重幽峩峩雲層四逹八交天老部仙五帝鑒朝玉皇回靈瓊輿緑飈四元䇿轡六師匡虬遊觀四天洞映九遼天真敷陳我慶同抄刻簡玄圖名書紫摽得與皇上同保億烋日月齊景長存無雕第二十九太極無崖紫虛洞幽梵迦摩夷天世羅天王姓玄諱霐第三十緑梵自然識慧入天雲九天王姓迦諱釋文羅第三十一玄梵大行無景無所念慧天宗提天王姓伊諱檀阿第三十二天雲梵上行維先阿檀天正群天王姓佇諱雲勳勃四天之音清玄元虛寶梵之氣在虛無太清之中四天王常以八節月朔之日同遊虛無太清無崖無極空無之上誦詠四天之音飛玄之章其日遣上真玉司仙王周行天下有學仙行道朝禮諸天誦經念善齋誡奉法之人即奏名天王刻書玄文壽同四天之人九年飛行上升太清之中四天飛玄之章曰詞首來天雲梵玄阿六氣吐精九象結羅瓊音朗逸玉唱清歌虛韻合節制命靈魔保元固玄六妖靜和天老臨正萬翹含葩玉真陶灌飛皇滂𩃰八素綴林上景散華金精洋洋玉離峩峩四貟啓明皇仙之家朱闕九重躡舄婆娑三十六音總歸提阿有知其韻上升紫霞壽同天人萬椿不蹉第三十三無色玄清洞微波梨答惒天天王姓王諱靈第三十四洞微玄上𣓕氣阿竭含那天天王姓柏諱墮世宗第三十五玄上天王姓朱緑梵滅然天諱陀雲彌第三十六極色上行梵泥維先若那