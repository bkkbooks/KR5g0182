明寶冠乘素雲之輿十二白虎執命靈九元之章飛行上升不驕樂之天便呪曰皓華映暉白闕九重四運梵維吉晨告皇元景理命記録天王列書帝簡上奏青宫九隂滅尸騰身華房永保上仙三晨齊光畢向西心拜六過咽氣六通止行之三十六年得乘素雲瓊輿上升不驕樂之天第六壘金剛鐵澤地正音土皇姓李諱上少君第六壘金剛鐵澤地行音土皇姓范諱來力安第六壘金剛鐵澤地遊音土皇姓長諱李季元第六壘金剛鐵澤地梵音土皇姓王諱駟女容右六壘之地四音土皇地載周竟四垂不極不窮無邊無際無色之氣去第五壘地二十億萬里如是第六壘土皇常以秋分之日乘素雲飛與十二白虎執九色制神之麾從氐老仙官飛天虎騎六千人上詣化應聲天奏地仙得道上學之人言名於四天之王凡學上法當以秋分之日晡時入室西向白筆書青紙上土皇內音服之叩齒九通仰存四土皇姓諱悉著素錦飛裙頭戴無極進賢之冠乘素雲之輿十二白虎執九色制神之麾飛行上升化應聲天便呪曰白土九壘氣通太微皇老臨晨騰景徘徊朱蘭映陳八華揚暉升入帝庭上披瓊扉五願玄會降致羽衣八景齊真形得升飛命同天地永保二儀畢西向心拜六過咽六氣止行之三十六年得乘素雲瓊輿上升化應聲天第七壘水制澤地正音土皇姓唐諱𥘉生映第七壘水制澤地行音土皇姓吳諱正法圖第七壘水制澤地遊音土皇姓漢諱髙文徹第七壘水制澤地梵音土皇姓京諱仲龍首右七壘之地四音土皇地載周竟四垂不極不窮無邊無際無色之氣去第六壘二十億萬里如是第七壘土皇常以立冬之日乘玄雲飛輿二十四玄武執五色命靈之幡從羌老仙官騰天之騎五千人詣梵寶天奏地仙得道上學之人言名於四天之王凡學上法當以立冬之日子時入室北向墨書土皇內音白紙上服之叩齒九通仰存四土皇姓諱悉著玄靈錦文飛裙頭戴無極進賢之冠乘玄雲飛輿二十四玄武執五色命靈之幡飛行上升梵寶天便呪曰五氣交帶八神回庭三元臨正土皇命靈雲輿羽蓋上升髙清大願開陳我納無形九壘滅迹天真刻名結編玄圖受號華青得乘飛景化入帝庭畢心拜五過咽五通止行之三十六年得乘玄雲之輿上升梵寶之天第八壘大風澤地正音土皇姓葛諱玄升先第八壘大風澤地行音土皇姓華諱茂雲長第八壘大風澤地遊音土皇姓羊諱真洞玄第八壘大風澤地梵音土皇姓周諱尚敬原右八壘之地四音土皇地載周竟四垂不極不窮無邊無際無色之氣去第七壘八十億萬里如是第八壘土皇常以冬至之日乘玄雲飛輿五色飛麟執九色之節從羌老仙官騰天之騎五千人上詣梵迦摩夷天奏地仙得道上學之人言名於四天之王凡學上法當以冬至日子時入室北向墨書白紙上土皇內音服之叩齒九通仰存四土皇姓諱悉著玄雲錦裙頭載通天寶冠乘玄雲羽輿五色飛麟執九色之節飛行上升梵迦摩夷天便呪曰天敷地陳九象法玄四度升降八氣明新土皇簡籙玉帝定真名題圖札我獲上仙飛行太虛縱景自然與靈同符與氣長存三變九化升入帝晨畢心拜四過仰咽氣四通止行之三十六年得乘玄雲之輿飛升梵迦摩夷之天第九壘洞淵無色剛維土皇姓極地氣正音諱無上玄第九壘洞淵旡色剛維土皇姓升地氣行音諱虛元浩第九壘洞淵無色剛維地氣遊音土皇姓趙諱上伯玄第九壘洞淵無色剛維地氣梵音土皇姓農諱勒元伯右九壘之地極下洞淵洞源剛維天地制使不落上則去第一壘五百二十億萬里下則無窮無境無邊無際皆剛維之氣如是第九壘土皇常以三月一日六月二日九月三日十二月四日一年四過乘五色雲輿九色飛龍執中元命神之章從傖老仙官耀天羽騎萬二千人上詣波梨答惒天奏九地學道得仙人名言於四天之王凡學上法當以其日入室向太歲黃書白紙上四土皇內音服之叩齒十二通仰存四土皇姓諱悉著玄黃五色之衣頭載九元通天寶冠足著五色獅子交文之履執文身保命之符乘黃霞飛輿從五帝玉女三十六人飛行上升波梨答惒天便呪曰二象回周九精洞靈皇老應符騰虛入清四通八達飛霞紫瓊上登金華奉對帝靈記仙元録青宫刻名得道白簡封字七靈九壘滅尸東井錬形三元降真我道巳明得乘飛景上登玉庭畢心禮九拜咽氣十二通止行之三十六年得乘黃霞飛軿上升波梨答惒之天九地九壘直下九重合三十六音三十六土皇上應三十六天中應三十六國如是土皇皆位齊玉皇之號但分氣各治上下之别名耳土皇三十六年轉號升上清之宫襲三十六天之王玉司之官於九壘之下皆舉學道得仙之名上奏九天天王為學不知九壘地音三十六土皇內諱九地不滅兆迹九天丞相不受兆名五嶽不降雲輿五帝不衛兆身徒明外國之音故不得匡虛而升也故天地人各稟三三之氣三合成真然後得仙也凡知九地之音三十六土皇內諱則九氣丈人常以四方五色靈官防衛兆身出入遊行登涉五嶽則仙官侍送滅魔威試降致神真九年飛空坐在立亡三十年上升太清居世得有此文七玄之祖則為九氣命靈土皇司官奉衛形骸撫慰靈魂蒿里父老土丞相掾皆為驅除無復拘閉責役之患居則在地保安無凶十二守將營扞八門通真致神欲富則富欲宦則宦欲仙則仙欲神則神此道祕妙非可言宣上相青童稟受髙上口訣寶篇妄泄靈文七祖充役萬劫不原欲登山住止及安居宅審地吉凶當以戊已之曰黃書九地三十六音文白紙上置所住中央以盆覆之三宿開看若有黃色潤紙大吉若有青色則下有死靈之尸若有白色者為凶若有赤色者驚恐若有黑色者則財寶若有紫色者得神仙都不異則止可三年安過此必折傷也髙上外國六品正音東方呵羅提之國第一品銘正音無夷第二品銘正音波泥第三品銘正音久難第四品銘正音吉維第五品銘正音無思第六品銘正音雲芝東方去中國九十萬里外名為呵羅提之國一名星國國外有扶桑在碧海之中地方萬里上有太帝宫太真王之别治有上生林如桑皆長數千丈大者三千圍兩兩同根而生有實赤如椹仙人所啖食體作金光色其實皆九千歲一生又有生洲在扶桑外西接蓬萊地面方二千五百里去岸二十三萬里上有仙家數萬人地無寒暑時節溫和多生神仙芝草食之飛空而行扶桑東又有祖洲在東海之中地方五百里去岸七萬里上有不死之草形似菰苖長三四天一名養神芝其葉似菰生不叢株一株食之飛行上清已死之人覆之則生神竒妙藥入其國冝知其名存胡老仙官採之於祖洲思其色而服之三年面有流光延壽萬年久久自然有仙人賫此神物降送於身也南方伊沙陀之國第一品銘正音盈華第二品銘正音王家第三品銘正音握魔第四品銘正音耀葩第五品銘正音武都第六品銘正音飛蒱南方去中國八萬一千里外名閻浮梨之外極洞陽之野國名伊沙陀之國一名火庭天竺之國國外有長洲一名青丘南海辰已地方五千里去岸二十五萬里則生大樹長三千丈大二千圍甚多靈藥甘液玉英無所不有其上有民人皆壽三百六十歲又靈狐之獸大者如犬色有五色呌聲響四千里威制虎豹萬禽得衣其毛壽同天地左則有風山山常震聲上有紫府宫天真神仙玉女所遊觀又有炎洲在南海中央地方二千里去岸九萬里上有風生獸似豹青色大如狸積火連天燒之經月不死毛亦不燃斫剌不入以鐵椎交煆其頭數千下乃死張口向風須臾復活以石上菖蒲塞其鼻即死取其腦和菊華服之壽固天地又有火林山山中有火光獸大如鼠毛長三四寸或赤或白於是夜半望山上林木及此獸光照如燃火取其獸毛作布名之火浣布若小汚以火燒之即鮮曰則伊沙陀國人所衣得此毛仙人降形學者存國之音思越老仙宫三十六年神人當以此獸及國神竒之物獻送於兆也西方尼維羅緑那之國第一品銘正音華連第二品銘音曰髙軒第三品銘音曰明身第四品銘音曰土纒第五品銘音曰星震第六品銘音曰朱天西方去中國六萬里外名俱邪尼之外極皓素之壟寒冗之野則尼維羅緑那之國一名雲胡月支國國人壽六百歲國外則有流洲在西海之南地方三千里去東岸十九萬里其上則有仙家數萬上有山生昆吾之石治石成鐵作劔光明照洞如水精割玉如土鳳麟洲在海中央地方一千五百里四面有弱水鴻毛所不浮上有仙家數千有鳳麟為群上有吉光之獸如狸能作故語聲如梵音與其國人通言毛生光奕奕悉仙人所衣得衣其毛壽同天地學者存其國音氐老仙官三十六年當獻送昆吾之劔吉光之獸於兆也北方旬他羅之國第一品銘音曰玄家第二品銘音曰文多第三品銘音曰山蘆第四品銘音曰武都第五品銘音曰盈家第六品銘音曰玄摩北方去中國分五萬里外名鬱單下極朔隂鈎陳之庭國名旬他羅之國一名天鏡之國國人壽三百歲國外則有玄洲方七千二百里四面是海去岸三十六萬里上有太玄都仙伯真公所治有𪈡鷟之鳥如浮氣多丘山名為風山與天西北門連界金堂玉室宫府生金玉紫芝是三天所治其外則有元洲地方三千里去南岸十萬里上生五芝玄澗澗水如蜜飲之與天地同年中有三萬仙家悉飲此水得仙不死學者存其國音羌老仙官三十六年獻降玄澗五芝水也上方元精青沌自然之國第一品銘正音重歡第二品銘正音玉金第三品銘正音三林第四品銘正音正精第五品銘正音吸鈐第六品銘正音緑嬰上方九天之上清陽恢空之內無色無象無形無影空洞之銘元精清沌自然之國一名洞澳清衍之國以清氣為芬世上極無窮四覆諸天惟有玉虛紫館結空洞之煙在虛玄青沌之內也為學存髙上之音則天人授子飛仙之方中方太和寶真無量之國第一品銘正音山蘆第二品銘正音世家第三品銘正音嵯峩第四品銘正音盈華第五品銘正音翟葩第六品銘正音羅那中國四周百二十億萬里下極大風澤五百二十億萬里崑崙處其中央弱水周匝繞山山髙平地三萬六千里上三角面方長萬里形似偃盆中狹上廣其一角正北干辰星之精名閬風臺一角正西名曰玄圃臺其一角正東名曰崑崙宫一處有積金為天墉城面方千里城上安金臺五所玉樓十二其北戶山承淵山並其支輔又有墉城金臺玉樓相似如一流精之闕光碧之堂瓊華之室紫翠丹房景雲燭日朱霞九光西王母之所治上通璇璣元氣流布五常玉衡普引九天之澳灌萬仙之宗根天地之紐萬度之柄矣上生金銀之樹瓊柯丹寶之林垂蘇瑰以為枝結玉精以為實其樹悉刻題三十六國音諸天內文上樓紫燕鳳鸞白雀朱鶚鵾雞靈鵠赤烏青鵲下則飛禽遊獸與崑崙同生初無死耗但玄文寶經隱書古字有千二百億萬言在玄圃之上積石之隂仙人有九萬人皆停散於靈山學者常誦諸天內音外國三十六音地下九壘之音九年仙人自當降送靈山之神竒三十六年得乘五色雲輿上登崑崙之山也髙上告上相青童君凡諸天文三十六國九地之音皆玄古空洞之書自然之章悉是上真帝皇以下及學仙得道莫不受音於太真佩文以遊行威制萬靈攝魔召精登涉五嶽及入三軍皆九天衛迎四司扶侍九年三元詣房三十六年天降雲輿飛行上清受其音以青繒為地黃筆書文以甲子之日夜半於中庭露醮以隨時珍果清酒三斗設以九盤九杯施九尺青羅之內以設諸文弟子賫上金九兩䌝紋之繒三十六尺南向而伏師北向叩齒三十六通上告九天丞相中告五帝五靈下關九土九氣丈人今上告八會天源朗清玉帝鑒映虛皇臨庭領仙校録東華簡名上學某甲仰慕神仙投盟誓靈奉受天文三十六音閉口修行敢泄靈真醴酒貢心上招髙晨元靈之氣下監兆臣自爾之後違負盟科七祖充責身沒河源長負刀山不敢蒙仙三官九府咸識盟言畢弟子置信左手執文向西北九拜回東南向九拜次向本命上九拜都畢上清外國放品青童內文卷下
